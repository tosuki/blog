<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Okaabe's Chronicles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pirata+One&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Prism.js for code highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    
    <!-- KaTeX for LaTeX support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Marked for Markdown support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="css/main.css">
    <script>
        // Apply theme immediately before body renders to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <header>
        <a href="index.html"><h1 class="logo">okaabe</h1></a>
        <button id="theme-toggle" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size:1.2rem; margin-top:10px;">☽</button>
    </header>

    <main>
        <article id="post-container" class="post-content">
            <div class="loading">Invocando registro...</div>
        </article>
        <div style="margin-top: 50px;">
            <a href="index.html" class="back-link">← Voltar para as Sombras</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Okaabe's Chronicles. "The Bird of Hermes is my name, Eating my wings to make me tame."</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Use centralized theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', toggleTheme);

        // Initialize KaTeX auto-render after Markdown is rendered
        function initKaTeX() {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.getElementById('post-container'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError : false
                });
            }
        }

        // Load specific post
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postFile = urlParams.get('file');
            
            if (postFile && typeof loadPost === 'function') {
                await loadPost(postFile);
                initKaTeX();
                if (typeof Prism !== 'undefined') {
                    Prism.highlightAll();
                }
            } else {
                document.getElementById('post-container').innerHTML = '<p>Registro não encontrado no abismo.</p>';
            }
        });
    </script>
</body>
</html>
