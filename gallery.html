<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens | Okaabe's Chronicles</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@400;700&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo">okaabe</a>
            <div id="theme-toggle" class="theme-toggle">☀</div>
        </div>
        <nav class="main-nav">
            <a href="index.html">Início</a>
            <a href="gallery.html" class="active">Galeria</a>
        </nav>
    </header>

    <main>
        <section class="gallery-section">
            <h1 class="page-title">Galeria de Registros</h1>
            <p class="page-description">Coleção de imagens e fragmentos visuais de nossas crônicas.</p>
            
            <div id="gallery-container" class="gallery-grid">
                <!-- Images will be loaded here -->
                <div class="loading">Invocando imagens do abismo...</div>
            </div>
        </section>
    </main>

    <!-- Modal for Lightbox -->
    <div id="lightbox-modal" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Okaabe's Chronicles. Todos os direitos reservados.</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/gallery.js"></script>
    <script>
        // Use centralized theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }
    </script>
</body>
</html>
