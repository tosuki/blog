<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okaabe's Chronicles | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pirata+One&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script>
        // Apply theme immediately before body renders to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <header>
        <h1 class="logo">okaabe</h1>
        <button id="theme-toggle" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size:1.2rem; margin-top:10px;">☽</button>
    </header>

    <main id="post-list">
        <!-- Posts will be injected here -->
        <div class="loading">Invocando registros...</div>
    </main>

    <footer>
        <p>&copy; 2026 Okaabe's Chronicles. "The Bird of Hermes is my name, Eating my wings to make me tame."</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Use centralized theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', toggleTheme);
        
        // Load post list on index
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof loadPostList === 'function') {
                loadPostList();
            }
        });
    </script>
</body>
</html>
