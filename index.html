<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okaabe's Chronicles | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pirata+One&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="alternate" type="application/rss+xml" title="Okaabe's Chronicles RSS Feed" href="rss.xml" />
    <script>
        // Apply theme immediately before body renders to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo">okaabe</a>
            <div id="theme-toggle" class="theme-toggle">☽</div>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="active">Início</a>
            <a href="gallery.html">Galeria</a>
        </nav>
    </header>

    <main>
        <section class="search-filter-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Pesquisar nos registros..." aria-label="Pesquisar">
                <button id="search-btn">Buscar</button>
            </div>
            <div id="category-filters" class="category-filters">
                <!-- Categories will be injected here -->
            </div>
            <div id="search-feedback" class="search-feedback"></div>
        </section>

        <div id="post-list">
            <!-- Posts will be injected here -->
            <div class="loading">Invocando registros...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Okaabe's Chronicles. "The Bird of Hermes is my name, Eating my wings to make me tame."</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Use centralized theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', toggleTheme);
        
        // Load post list on index
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof loadPostList === 'function') {
                loadPostList();
            }
        });
    </script>
</body>
</html>
